<!DOCTYPE html>
<html>
<head>
    <title>UBA - SFTP Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5 text-center">
    <div class="card p-4 shadow">
        <h2 class="text-primary">Sistemas UBA - Módulo II</h2>
        <p>Transferencia Segura de Archivos (SFTP)</p>
        <form action="/subir" method="POST" enctype="multipart/form-data">
            <input type="file" name="archivo" class="form-control mb-3" required>
            <button type="submit" class="btn btn-primary w-100">Subir al VPS</button>
        </form>
    </div>
</body>
</html>
